name: MobileClaw
options:
  bundleIdPrefix: com.clarkkuang82
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  MCCore:
    path: Packages/MCCore
  MCNetworking:
    path: Packages/MCNetworking
  MCPersistence:
    path: Packages/MCPersistence
  MCPClient:
    path: Packages/MCPClient
  MCAgents:
    path: Packages/MCAgents
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targetTemplates:
  MobileClawApp:
    sources:
      - MobileClaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clarkkuang82.MobileClaw
        INFOPLIST_KEY_CFBundleDisplayName: MobileClaw
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: MCCore
      - package: MCNetworking
      - package: MCPersistence
      - package: MCPClient
      - package: MCAgents
      - package: MarkdownUI
    entitlements:
      path: MobileClaw/Resources/MobileClaw.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

targets:
  MobileClaw-iOS:
    type: application
    platform: iOS
    templates:
      - MobileClawApp

  MobileClaw-macOS:
    type: application
    platform: macOS
    templates:
      - MobileClawApp

  MobileClawTests-iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MobileClawTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MobileClaw-iOS
      - package: MCCore
      - package: MCNetworking
      - package: MCPersistence

  MobileClawTests-macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MobileClawTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MobileClaw-macOS
      - package: MCCore
      - package: MCNetworking
      - package: MCPersistence
